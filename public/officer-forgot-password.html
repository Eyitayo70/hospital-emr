<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password · Health Officer Portal</title>
<link rel="icon" href="/img/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="/css/style.css">
<meta name="robots" content="noindex, nofollow">
</head>
<body>
<div style="max-width:420px; margin:60px auto; padding:0 24px;">
  <div style="margin-bottom:24px;">
    <a href="/officer-portal.html" style="display:flex; align-items:center; gap:8px; font-size:.85rem; color:var(--ink-soft); text-decoration:none; margin-bottom:6px;">
      <img src="/img/logo.svg" alt="" width="20" height="20">← Health Officer Portal
    </a>
    <h1>Reset Your Password</h1>
  </div>

  <div class="panel" id="stepRequest">
    <p style="color:var(--ink-soft);">Enter your work email — we'll send a reset code.</p>
    <form id="requestForm">
      <div class="field required"><label>Email</label><input type="email" name="email" required autofocus></div>
      <button class="btn" type="submit" style="width:100%; justify-content:center;">Send Reset Code</button>
    </form>
  </div>

  <div class="panel" id="stepReset" style="display:none;">
    <p style="color:var(--ink-soft);">We sent a code to <strong id="resetEmailLabel"></strong> if an account exists for it. It expires in 15 minutes.</p>
    <form id="resetForm">
      <div class="field required"><label>Reset code</label><input name="code" maxlength="6" inputmode="numeric" required autofocus></div>
      <div class="field required"><label>New password</label><input type="password" name="new_password" minlength="6" required></div>
      <button class="btn" type="submit" style="width:100%; justify-content:center;">Set New Password</button>
    </form>
    <button class="btn ghost small" id="backBtn" style="margin-top:10px;">← Start over</button>
  </div>

  <div class="panel" id="stepDone" style="display:none; text-align:center;">
    <h3>Password updated</h3>
    <p style="color:var(--ink-soft);">You can now log in with your new password (plus your email code, as usual).</p>
    <a class="btn" href="/officer-login.html">Log In</a>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
let pendingEmail = "";

document.getElementById("requestForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector("button[type=submit]");
  btn.disabled = true;
  const email = e.target.email.value.trim();
  try {
    await Api.requestPasswordReset({ email, role: "officer" });
    pendingEmail = email;
    document.getElementById("resetEmailLabel").textContent = email;
    document.getElementById("stepRequest").style.display = "none";
    document.getElementById("stepReset").style.display = "block";
    toast("If that account exists, a code was sent");
  } catch (err) {
    toast(err.message, true);
  } finally {
    btn.disabled = false;
  }
});

document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector("button[type=submit]");
  btn.disabled = true;
  try {
    await Api.resetPassword({
      email: pendingEmail, role: "officer",
      code: e.target.code.value.trim(),
      new_password: e.target.new_password.value,
    });
    document.getElementById("stepReset").style.display = "none";
    document.getElementById("stepDone").style.display = "block";
  } catch (err) {
    toast(err.message, true);
    btn.disabled = false;
  }
});

document.getElementById("backBtn").addEventListener("click", () => {
  document.getElementById("stepReset").style.display = "none";
  document.getElementById("stepRequest").style.display = "block";
});
</script>
</body>
</html>
